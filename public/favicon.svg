<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Very light cream background -->
  <rect width="64" height="64" fill="#FFFCF7" rx="0"/>
  
  <!-- Elegant fork and spoon in warm creamy clay color -->
  <g stroke="#D4A574" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork prongs (left side) -->
    <path d="M 18 14 L 18 38 Q 18 44 23 44"/>
    <path d="M 23 14 L 23 40 Q 23 46 28 46"/>
    <path d="M 28 14 L 28 38 Q 28 44 33 44"/>
    
    <!-- Fork handle connecting prongs -->
    <line x1="18" y1="14" x2="28" y2="14" stroke-width="2"/>
    
    <!-- Spoon (right side) -->
    <path d="M 40 14 L 40 28 Q 40 38 38 42 Q 37 45 34 45"/>
    
    <!-- Spoon bowl - more prominent -->
    <ellipse cx="39" cy="42" rx="5" ry="6" stroke="#D4A574" stroke-width="2.5" fill="#D4A574" opacity="0.15"/>
    
    <!-- Accent line -->
    <line x1="40" y1="14" x2="40" y2="12" stroke-width="2.5"/>
  </g>
  
  <!-- Warm coral accent on top -->
  <circle cx="32" cy="10" r="1.5" fill="#E0634A"/>
</svg>
